<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="WRGICON.png?v=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="canonical" href="https://warrobotsguide.com/" />
    
    <!-- SEO Meta Tags -->
    <title>War Robots Guide Database</title>
    <meta name="description" content="Find optimal builds, check out tier lists, chart weapon DPS, and more at the WRG database!" />
    <meta name="keywords" content="War Robots, War Robots Guide, WR Tier List, Robot Builds, Weapon DPS, Hangar Analyzer, Pilots Skills, Module Specializations" />
    <meta name="author" content="War Robots Guide Community" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="War Robots Guide Database" />
    <meta property="og:description" content="Find optimal builds, check out tier lists, chart weapon DPS, and more at the WRG database!" />
    <meta property="og:image" content="https://warrobotsguide.com/banner.jpg" />
    
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="War Robots Guide Database" />
    <meta name="twitter:description" content="Find optimal builds, check out tier lists, chart weapon DPS, and more at the WRG database!" />
    <meta name="twitter:image" content="https://warrobotsguide.com/banner.jpg" />

    <meta name="theme-color" content="#0a0e17" />

    <!-- Redirect legacy hash URLs to path URLs -->
    <script>
      (function() {
        if (window.location.hash && (window.location.pathname === '/' || window.location.pathname === '/index.html')) {
          var tab = window.location.hash.replace('#', '');
          if (['dashboard', 'tiers', 'robots', 'builds', 'specializations', 'pilots', 'weapons', 'hangar'].includes(tab)) {
            window.location.replace(tab === 'dashboard' ? '/' : '/' + tab);
          }
        }
      })();
    </script>

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "War Robots Guide Database",
        "url": "https://warrobotsguide.com",
        "description": "Find optimal builds, check out tier lists, chart weapon DPS, and run hangar analysis at the War Robots Guide community database!",
        "publisher": {
          "@type": "Organization",
          "name": "War Robots Guide Community"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="padding: 24px; text-align: center; color: #fff; background: #0a0e17; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 16px;">
        <h2>JavaScript Required</h2>
        <p>You need to enable JavaScript to view the War Robots Guide database and analyzer tools.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
