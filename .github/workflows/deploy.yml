name: Deploy War Robots Guide Website

on:
  push:
    branches:
      - master
  schedule:
    # Run daily at midnight UTC to check for Google Drive updates
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: read

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for peaceiris/actions-gh-pages to deploy

    steps:
      # 1. Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # 2. Setup Python environment
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.10'
          cache: 'pip'

      # 3. Install Python dependencies
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Fetch the latest files from Google Drive (Optional if secrets are set)
      - name: Fetch Google Drive Content
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
        run: |
          python scripts/fetch_gdrive.py

      # 5. Parse raw spreadsheets and word guides into structured JSON
      - name: Parse Data Files
        run: |
          python scripts/parse_data.py

      # 6. Setup Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'

      # 7. Install Node.js dependencies
      - name: Install Node.js Dependencies
        run: npm ci

      # 8. Lint the code to verify quality
      - name: Lint Codebase
        run: npm run lint

      # 9. Validate generated JSON contracts before the frontend imports them
      - name: Validate Data Files
        run: npm run validate:data

      # 10. Build the static React application
      - name: Build Production Assets
        run: npm run build

      # 11. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
